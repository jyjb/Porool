; Porool configuration file

[porool]
tharavu_ini           = tharavu.ini
data_dir              = ./data
vocab_name            = porool.vocab
chunks_table          = porool.chunks
vectors_table         = porool.chunks_vec
top_k_default         = 10
max_context_chars     = 2000
optimal_chunk_len     = 500.0
length_penalty_sigma  = 200.0
default_source_weight = 1.0
vocabularies          = general

[general]
english = general/english.ovoc
french  = general/french.ovoc

[scoring]
; Composite score = cosine*w1 + length_score*w2 + source_score*w3
; Weights should sum to 1.0
w1 = 0.60
w2 = 0.20
w3 = 0.20

[source_weights]
; Per-source priority multipliers.  Range [0.0, 2.0]; values outside are clamped.
; Add entries in the form:  source_name = weight
; Example:  my_docs = 1.5
